name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fast-tests:
    name: Fast tests (CPU, no model download)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip wheels so dependency install is fast on repeat runs
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      # Cache HuggingFace model weights — GPT-2 is ~500 MB and needed even
      # for fast tests because the module-scope engine fixture loads it once
      # for the whole test session.  Without this cache every push re-downloads
      # GPT-2 and the job fails or times out on the free Actions tier.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-gpt2-${{ runner.os }}
          restore-keys: hf-gpt2-

      - name: Install package + dev deps
        run: pip install -e ".[dev]" --quiet

      # Run only tests NOT marked @pytest.mark.slow.
      # GPT-2 is loaded once via the module-scope engine fixture (~30 s on
      # first run, instant on cache hit).  The actual fast tests complete in
      # a few seconds after that.
      - name: Run fast tests
        run: pytest tests/ -v --tb=short -m "not slow"
        timeout-minutes: 15

  slow-tests:
    name: Slow tests (GPU optional, full model suite)
    # Only run when manually triggered via workflow_dispatch, not on every push.
    # This avoids downloading GPT-2 (~500 MB) on every commit.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      # Cache HuggingFace model weights so GPT-2 is not re-downloaded on
      # every slow-test run.  Cache key includes the model name so a new
      # model or different variant gets its own cache slot.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-gpt2-${{ runner.os }}
          restore-keys: hf-gpt2-

      - name: Install package + dev deps
        run: pip install -e ".[dev]" --quiet

      - name: Run full test suite (including slow)
        run: pytest tests/ -v --tb=short
        # Generous timeout — GPT-2 load + 38 tests on CPU takes ~5 min
        timeout-minutes: 20
