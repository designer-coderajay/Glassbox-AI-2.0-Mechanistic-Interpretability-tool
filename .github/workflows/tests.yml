name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fast-tests:
    name: Fast tests (CPU, no model download)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip wheels so dependency install is fast on repeat runs.
      # Key includes pyproject.toml hash so a dep change busts the cache.
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      # Cache HuggingFace model weights — GPT-2 is ~500 MB.
      # Key is OS-only (no hash) so it survives pyproject.toml changes.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-gpt2-${{ runner.os }}
          restore-keys: hf-gpt2-

      # Drop --quiet so installation errors are always visible in the log.
      - name: Install package + dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      # Confirm the key packages installed correctly (helps debug future CI issues).
      - name: Show installed versions
        run: pip list | grep -E "torch|transformer.lens|glassbox|pytest|sae"

      # Run only tests NOT marked @pytest.mark.slow.
      # GPT-2 is loaded once via the module-scope engine fixture (~30 s on
      # first run after a cold HF cache, instant on cache hit).
      - name: Run fast tests
        run: pytest tests/ -v --tb=short -m "not slow"
        timeout-minutes: 20

  slow-tests:
    name: Slow tests (GPU optional, full model suite)
    # Only run when manually triggered via workflow_dispatch, not on every push.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-gpt2-${{ runner.os }}
          restore-keys: hf-gpt2-

      - name: Install package + dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Show installed versions
        run: pip list | grep -E "torch|transformer.lens|glassbox|pytest|sae"

      - name: Run full test suite (including slow)
        run: pytest tests/ -v --tb=short
        # Generous timeout — GPT-2 load + all tests on CPU takes ~5 min
        timeout-minutes: 25
