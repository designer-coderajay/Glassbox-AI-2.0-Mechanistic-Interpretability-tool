name: Publish to PyPI

# Triggers on any tag that starts with "v" (e.g. v2.4.2, v3.0.0)
# Uses OIDC Trusted Publisher — no API token required.
#
# One-time setup (already done by repo owner):
#   https://pypi.org/manage/project/glassbox-mech-interp/settings/publishing/
#   → Trusted Publisher settings:
#       Owner:    designer-coderajay
#       Repo:     Glassbox-AI-2.0-Mechanistic-Interpretability-tool
#       Workflow: publish.yml
#       Env:      pypi   ← must match the environment: name below
#
# GitHub repo setup:
#   Settings → Environments → "pypi" environment must exist

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build --quiet

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify metadata (twine check)
        run: |
          pip install twine --quiet
          python -m twine check dist/*

      - name: Show what was built
        run: ls -lh dist/

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/glassbox-mech-interp

    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publisher

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

      - name: Verify dist before upload
        run: |
          pip install twine --quiet
          python -m twine check dist/*

      - name: Get PyPI upload token (OIDC)
        run: |
          python3 << 'PYEOF'
          import os, urllib.request, json, sys, urllib.error

          # Get OIDC token
          url = os.environ['ACTIONS_ID_TOKEN_REQUEST_URL'] + '&audience=pypi'
          req = urllib.request.Request(url, headers={"Authorization": f"bearer {os.environ['ACTIONS_ID_TOKEN_REQUEST_TOKEN']}"})
          with urllib.request.urlopen(req) as r:
              oidc_token = json.loads(r.read())['value']

          # Exchange for PyPI upload token
          body = json.dumps({'token': oidc_token}).encode()
          req2 = urllib.request.Request(
              'https://pypi.org/_/oidc/github/mint-token',
              data=body, headers={'Content-Type': 'application/json'}
          )
          try:
              with urllib.request.urlopen(req2) as r:
                  upload_token = json.loads(r.read())['token']
              print(f'::notice::OIDC mint-token SUCCESS (token prefix: {upload_token[:15]}...)')
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f'PYPI_UPLOAD_TOKEN={upload_token}\n')
          except urllib.error.HTTPError as e:
              print(f'::error::mint-token FAILED {e.code}: {e.read().decode()}')
              sys.exit(1)
          PYEOF

      - name: Upload to PyPI via Python (requests)
        run: |
          pip install requests --quiet
          python3 << 'PYEOF'
          import os, glob, hashlib, sys
          import urllib.request, urllib.error
          import json, base64

          try:
              import requests
          except ImportError:
              print('::error::requests not installed')
              sys.exit(1)

          upload_token = os.environ.get('PYPI_UPLOAD_TOKEN', '')
          if not upload_token:
              print('::error::PYPI_UPLOAD_TOKEN is empty')
              sys.exit(1)

          UPLOAD_URL = 'https://upload.pypi.org/legacy/'

          files_to_upload = sorted(glob.glob('dist/*'))
          print(f'::notice::Files to upload: {files_to_upload}')

          all_ok = True
          for filepath in files_to_upload:
              fname = os.path.basename(filepath)
              print(f'::notice::Uploading {fname}...')
              with open(filepath, 'rb') as fh:
                  content = fh.read()

              md5 = hashlib.md5(content).hexdigest()
              sha2 = hashlib.sha256(content).hexdigest()

              # Determine file type
              if filepath.endswith('.whl'):
                  filetype = 'bdist_wheel'
              else:
                  filetype = 'sdist'

              data = {
                  ':action': 'file_upload',
                  'protocol_version': '1',
                  'metadata_version': '1.0',
                  'filetype': filetype,
                  'md5_digest': md5,
                  'sha2_digest': sha2,
              }

              try:
                  resp = requests.post(
                      UPLOAD_URL,
                      auth=('__token__', upload_token),
                      files={'content': (fname, content, 'application/zip')},
                      data=data,
                      timeout=120,
                  )
                  print(f'::notice::{fname} → HTTP {resp.status_code}')
                  if resp.status_code not in (200, 400):
                      print(f'::error::Upload failed {resp.status_code}: {resp.text[:500]}')
                      all_ok = False
                  elif resp.status_code == 400:
                      body = resp.text.strip()
                      if 'already exist' in body.lower() or 'duplicate' in body.lower():
                          print(f'::notice::{fname} already exists — skipping')
                      else:
                          print(f'::error::400 from PyPI: {body[:500]}')
                          all_ok = False
              except Exception as exc:
                  print(f'::error::Exception uploading {fname}: {exc}')
                  all_ok = False

          sys.exit(0 if all_ok else 1)
          PYEOF
