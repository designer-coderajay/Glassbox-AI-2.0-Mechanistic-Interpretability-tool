name: Publish to PyPI

# Triggers on any tag that starts with "v" (e.g. v2.3.4, v2.4.0)
# Uses OIDC Trusted Publisher — no API token required.
#
# One-time setup (already done by repo owner):
#   https://pypi.org/manage/project/glassbox-mech-interp/settings/publishing/
#   → Trusted Publisher settings:
#       Owner:    designer-coderajay
#       Repo:     Glassbox-AI-2.0-Mechanistic-Interpretability-tool
#       Workflow: publish.yml
#       Env:      pypi   ← must match the environment: name below
#
# GitHub repo setup:
#   Settings → Environments → create "pypi" (no extra rules needed)

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build --quiet

      - name: Build wheel + sdist
        run: python -m build

      - name: Show what was built
        run: ls -lh dist/

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # "pypi" must match the Environment name you entered in PyPI's
    # Trusted Publisher settings.  If you left it blank on PyPI, delete
    # the environment block below AND update the comment in the header.
    environment:
      name: pypi
      url: https://pypi.org/p/glassbox-mech-interp

    permissions:
      id-token: write   # required for OIDC Trusted Publisher

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

      # Decode and surface the OIDC token claims so we can verify they
      # match the PyPI Trusted Publisher config even without log access.
      - name: Show OIDC token claims (diagnostic)
        run: |
          TOKEN=$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=pypi" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['value'])")
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2 | python3 -c "
          import sys, base64, json
          raw = sys.stdin.read().strip()
          raw += '=' * (4 - len(raw) % 4)
          claims = json.loads(base64.urlsafe_b64decode(raw))
          keys = ['repository','repository_owner','workflow','environment','job_workflow_ref','ref']
          for k in keys:
              print(f'{k}: {claims.get(k,\"<not present>\")}')
          ")
          echo "--- OIDC claims relevant to PyPI Trusted Publisher ---"
          echo "$PAYLOAD"
          echo "## OIDC token claims" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$PAYLOAD" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Match these values in https://pypi.org/manage/project/glassbox-mech-interp/settings/publishing/" >> $GITHUB_STEP_SUMMARY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true        # prints token claims on failure — helps diagnose mismatches
