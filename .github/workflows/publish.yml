name: Publish to PyPI

# Triggers on any tag that starts with "v" (e.g. v2.4.2, v3.0.0)
# Uses OIDC Trusted Publisher — no API token required.
#
# One-time setup (already done by repo owner):
#   https://pypi.org/manage/project/glassbox-mech-interp/settings/publishing/
#   → Trusted Publisher settings:
#       Owner:    designer-coderajay
#       Repo:     Glassbox-AI-2.0-Mechanistic-Interpretability-tool
#       Workflow: publish.yml
#       Env:      pypi   ← must match the environment: name below
#
# GitHub repo setup:
#   Settings → Environments → "pypi" environment must exist

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build --quiet

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify metadata (twine check)
        run: |
          pip install twine --quiet
          python -m twine check dist/*

      - name: Show what was built
        run: ls -lh dist/

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/glassbox-mech-interp

    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publisher

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

      - name: Verify dist before upload
        run: |
          pip install twine --quiet
          python -m twine check dist/*

      - name: Upload to PyPI via OIDC
        run: |
          python3 << 'PYEOF'
          import os, urllib.request, json, subprocess, sys

          # 1. Get OIDC token from GitHub
          url = os.environ['ACTIONS_ID_TOKEN_REQUEST_URL'] + '&audience=pypi'
          req = urllib.request.Request(url, headers={"Authorization": f"bearer {os.environ['ACTIONS_ID_TOKEN_REQUEST_TOKEN']}"})
          with urllib.request.urlopen(req) as r:
              oidc_token = json.loads(r.read())['value']

          # 2. Exchange for PyPI upload token
          import urllib.error
          body = json.dumps({'token': oidc_token}).encode()
          req2 = urllib.request.Request(
              'https://pypi.org/_/oidc/github/mint-token',
              data=body, headers={'Content-Type': 'application/json'}
          )
          try:
              with urllib.request.urlopen(req2) as r:
                  upload_token = json.loads(r.read())['token']
              print('::notice::OIDC exchange with PyPI: SUCCESS')
          except urllib.error.HTTPError as e:
              msg = e.read().decode()
              print(f'::error::PyPI mint-token {e.code}: {msg}')
              sys.exit(1)

          # 3. Upload with twine — all output goes to annotations
          env = os.environ.copy()
          env['TWINE_USERNAME'] = '__token__'
          env['TWINE_PASSWORD'] = upload_token
          result = subprocess.run(
              ['python', '-m', 'twine', 'upload', '--skip-existing', '--verbose', 'dist/*'],
              env=env, capture_output=True, text=True
          )
          combined = (result.stdout + '\n' + result.stderr).strip()
          if result.returncode != 0:
              for line in combined.splitlines():
                  if line.strip():
                      print(f'::error::{line.strip()}')
              sys.exit(result.returncode)
          else:
              print('::notice::Package uploaded to PyPI successfully!')
          PYEOF
