# Glassbox AI — Automated Compliance Audit GitHub Action
# ========================================================
#
# Runs a Glassbox EU AI Act Annex IV compliance audit on every push that
# modifies model weights or code. Fails CI if the compliance grade drops
# below the configured threshold.
#
# HOW TO USE IN YOUR OWN REPO
# ----------------------------
# 1. Copy this file to .github/workflows/glassbox-audit.yml in your repo.
# 2. Set the inputs below (see "Configure your audit" section).
# 3. Optionally add SLACK_WEBHOOK_URL or TEAMS_WEBHOOK_URL as GitHub Secrets.
#
# WHAT IT DOES
# ------------
# - Installs glassbox-mech-interp from PyPI
# - Runs gb.analyze() on your configured prompt
# - Uploads the Annex IV compliance report as a GitHub Actions artifact
# - Sets a commit status (success / failure) based on compliance grade
# - Optionally sends a Slack / Teams notification
# - Fails the CI job if sufficiency < GLASSBOX_MIN_SUFFICIENCY
#
# GITHUB SECRETS REQUIRED (optional)
# ------------------------------------
# SLACK_WEBHOOK_URL   — Slack incoming webhook for audit notifications
# TEAMS_WEBHOOK_URL   — Teams incoming webhook for audit notifications
#
# ENVIRONMENT VARIABLES (set in the "env:" block below)
# -------------------------------------------------------
# GLASSBOX_MODEL_NAME       — TransformerLens model name (e.g. "gpt2")
# GLASSBOX_PROMPT           — Audit prompt string
# GLASSBOX_CORRECT_TOKEN    — Expected correct token (e.g. " Mary")
# GLASSBOX_INCORRECT_TOKEN  — Contrastive incorrect token (e.g. " John")
# GLASSBOX_MIN_SUFFICIENCY  — Minimum acceptable sufficiency (default: 0.70)
# GLASSBOX_PROVIDER_NAME    — Your organisation name for Annex IV report
# GLASSBOX_USE_CASE         — Deployment use case description
#
# EXAMPLE COMMIT STATUS BEHAVIOUR
# ---------------------------------
# sufficiency >= 0.90  → ✅ CI passes,  grade Excellent
# sufficiency >= 0.75  → ✅ CI passes,  grade Good
# sufficiency >= 0.70  → ⚠️  CI passes,  grade Marginal  (warning)
# sufficiency < 0.70   → ❌ CI FAILS    (below GLASSBOX_MIN_SUFFICIENCY)

name: Glassbox Compliance Audit

on:
  push:
    branches: [ "main", "master", "release/**" ]
    paths:
      # Trigger when model weights, configs, or core ML code change.
      # Adjust these paths to match your repo structure.
      - "**.pt"
      - "**.safetensors"
      - "**.bin"
      - "**.gguf"
      - "model/**"
      - "src/**/*.py"
      - "glassbox-audit.yml"          # re-run if this config changes
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - "**.pt"
      - "**.safetensors"
      - "model/**"
      - "src/**/*.py"
  workflow_dispatch:                   # allow manual trigger from Actions UI
    inputs:
      model_name:
        description: "TransformerLens model name (overrides env var)"
        required: false
        default: ""
      min_sufficiency:
        description: "Minimum sufficiency threshold (0.0–1.0)"
        required: false
        default: "0.70"

# ── Configure your audit here ────────────────────────────────────────────────
env:
  GLASSBOX_MODEL_NAME:       "gpt2"
  GLASSBOX_PROMPT:           "When Mary and John went to the store, John gave a drink to"
  GLASSBOX_CORRECT_TOKEN:    " Mary"
  GLASSBOX_INCORRECT_TOKEN:  " John"
  GLASSBOX_MIN_SUFFICIENCY:  "0.70"
  GLASSBOX_PROVIDER_NAME:    "${{ github.repository_owner }}"
  GLASSBOX_USE_CASE:         "Automated CI/CD compliance audit"
  GLASSBOX_DEPLOYMENT_CTX:   "other_high_risk"
# ── End configuration ────────────────────────────────────────────────────────

jobs:
  glassbox-audit:
    name: EU AI Act Compliance Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write      # to post commit status
      checks:   write      # to post check run summary

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install Glassbox and dependencies ───────────────────────────────
      - name: Install Glassbox AI
        run: |
          pip install --upgrade pip
          pip install "glassbox-mech-interp>=3.6.0" transformer-lens torch --index-url https://download.pytorch.org/whl/cpu
          # Uncomment for PDF report generation:
          # pip install reportlab

      # ── 4. Run the compliance audit ────────────────────────────────────────
      # The audit logic lives in scripts/glassbox_ci_audit.py (avoids YAML
      # escaping issues with Markdown table pipe characters in inline Python).
      - name: Run Glassbox Compliance Audit
        id: audit
        env:
          OVERRIDE_MODEL:     ${{ github.event.inputs.model_name }}
          OVERRIDE_THRESHOLD: ${{ github.event.inputs.min_sufficiency }}
        run: python3 scripts/glassbox_ci_audit.py

      # ── 5. Upload compliance reports as artifacts ───────────────────────────
      - name: Upload Annex IV Compliance Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: glassbox-annex-iv-${{ github.sha }}
          path: glassbox-reports/
          retention-days: 90

      # ── 6. Post job summary badge ──────────────────────────────────────────
      - name: Compliance Summary
        if: always()
        run: |
          echo "Sufficiency:  ${{ steps.audit.outputs.sufficiency }}"
          echo "Grade:        ${{ steps.audit.outputs.grade }}"
          echo "Circuit heads: ${{ steps.audit.outputs.n_heads }}"
          echo "Result:       ${{ steps.audit.outputs.passed == 'true' && 'PASSED ✅' || 'FAILED ❌' }}"

      # ── 7. Slack notification (optional) ──────────────────────────────────
      - name: Slack Notification
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GRADE:      ${{ steps.audit.outputs.grade }}
          SUFF:       ${{ steps.audit.outputs.sufficiency }}
          PASSED:     ${{ steps.audit.outputs.passed }}
          RUN_URL:    ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PYEOF'
          import os, json, urllib.request

          grade  = os.environ["GRADE"]
          suff   = float(os.environ["SUFF"])
          passed = os.environ["PASSED"] == "true"
          url    = os.environ["RUN_URL"]
          repo   = os.environ.get("GITHUB_REPOSITORY", "")
          sha    = os.environ.get("GITHUB_SHA", "")[:8]
          emoji  = "✅" if grade in ("Excellent", "Good") else ("⚠️" if grade == "Marginal" else "❌")

          payload = {
              "username": "Glassbox AI",
              "icon_emoji": ":shield:",
              "blocks": [
                  {"type": "header", "text": {"type": "plain_text", "text": f"{emoji} Glassbox CI Audit — {grade}"}},
                  {"type": "section", "fields": [
                      {"type": "mrkdwn", "text": f"*Repo:* `{repo}`"},
                      {"type": "mrkdwn", "text": f"*Commit:* `{sha}`"},
                      {"type": "mrkdwn", "text": f"*Sufficiency:* {suff:.1%}"},
                      {"type": "mrkdwn", "text": f"*Result:* {'PASSED ✅' if passed else 'FAILED ❌'}"},
                  ]},
                  {"type": "actions", "elements": [{"type": "button", "text": {"type": "plain_text", "text": "View CI Run"}, "url": url}]},
              ]
          }
          body = json.dumps(payload).encode()
          req  = urllib.request.Request(os.environ["SLACK_WEBHOOK_URL"], data=body, headers={"Content-Type": "application/json"})
          urllib.request.urlopen(req, timeout=10)
          PYEOF

      # ── 8. Teams notification (optional) ──────────────────────────────────
      - name: Teams Notification
        if: always() && env.TEAMS_WEBHOOK_URL != ''
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          GRADE:   ${{ steps.audit.outputs.grade }}
          SUFF:    ${{ steps.audit.outputs.sufficiency }}
          PASSED:  ${{ steps.audit.outputs.passed }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PYEOF'
          import os, json, urllib.request
          grade   = os.environ["GRADE"]
          suff    = float(os.environ["SUFF"])
          passed  = os.environ["PASSED"] == "true"
          color   = {"Excellent": "22C55E", "Good": "84CC16", "Marginal": "F59E0B"}.get(grade, "EF4444")
          payload = {
              "@type": "MessageCard", "@context": "http://schema.org/extensions",
              "themeColor": color, "summary": f"Glassbox audit: {grade}",
              "title": f"Glassbox CI — {grade} ({'PASSED' if passed else 'FAILED'})",
              "sections": [{"facts": [
                  {"name": "Repository", "value": os.environ.get("GITHUB_REPOSITORY", "")},
                  {"name": "Commit", "value": os.environ.get("GITHUB_SHA", "")[:8]},
                  {"name": "Sufficiency", "value": f"{suff:.1%}"},
                  {"name": "Grade", "value": grade},
              ]}],
              "potentialAction": [{"@type": "OpenUri", "name": "View Run", "targets": [{"os": "default", "uri": os.environ["RUN_URL"]}]}]
          }
          body = json.dumps(payload).encode()
          req  = urllib.request.Request(os.environ["TEAMS_WEBHOOK_URL"], data=body, headers={"Content-Type": "application/json"})
          urllib.request.urlopen(req, timeout=10)
          PYEOF
