# Glassbox AI — Automated Compliance Audit GitHub Action
# ========================================================
#
# Runs a Glassbox EU AI Act Annex IV compliance audit on every push that
# modifies model weights or code. Fails CI if the compliance grade drops
# below the configured threshold.
#
# HOW TO USE IN YOUR OWN REPO
# ----------------------------
# 1. Copy this file to .github/workflows/glassbox-audit.yml in your repo.
# 2. Set the inputs below (see "Configure your audit" section).
# 3. Optionally add SLACK_WEBHOOK_URL or TEAMS_WEBHOOK_URL as GitHub Secrets.
#
# WHAT IT DOES
# ------------
# - Installs glassbox-mech-interp from PyPI
# - Runs gb.analyze() on your configured prompt
# - Uploads the Annex IV compliance report as a GitHub Actions artifact
# - Sets a commit status (success / failure) based on compliance grade
# - Optionally sends a Slack / Teams notification
# - Fails the CI job if sufficiency < GLASSBOX_MIN_SUFFICIENCY
#
# GITHUB SECRETS REQUIRED (optional)
# ------------------------------------
# SLACK_WEBHOOK_URL   — Slack incoming webhook for audit notifications
# TEAMS_WEBHOOK_URL   — Teams incoming webhook for audit notifications
#
# ENVIRONMENT VARIABLES (set in the "env:" block below)
# -------------------------------------------------------
# GLASSBOX_MODEL_NAME       — TransformerLens model name (e.g. "gpt2")
# GLASSBOX_PROMPT           — Audit prompt string
# GLASSBOX_CORRECT_TOKEN    — Expected correct token (e.g. " Mary")
# GLASSBOX_INCORRECT_TOKEN  — Contrastive incorrect token (e.g. " John")
# GLASSBOX_MIN_SUFFICIENCY  — Minimum acceptable sufficiency (default: 0.70)
# GLASSBOX_PROVIDER_NAME    — Your organisation name for Annex IV report
# GLASSBOX_USE_CASE         — Deployment use case description
#
# EXAMPLE COMMIT STATUS BEHAVIOUR
# ---------------------------------
# sufficiency >= 0.90  → ✅ CI passes,  grade Excellent
# sufficiency >= 0.75  → ✅ CI passes,  grade Good
# sufficiency >= 0.70  → ⚠️  CI passes,  grade Marginal  (warning)
# sufficiency < 0.70   → ❌ CI FAILS    (below GLASSBOX_MIN_SUFFICIENCY)

name: Glassbox Compliance Audit

on:
  push:
    branches: [ "main", "master", "release/**" ]
    paths:
      # Trigger when model weights, configs, or core ML code change.
      # Adjust these paths to match your repo structure.
      - "**.pt"
      - "**.safetensors"
      - "**.bin"
      - "**.gguf"
      - "model/**"
      - "src/**/*.py"
      - "glassbox-audit.yml"          # re-run if this config changes
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - "**.pt"
      - "**.safetensors"
      - "model/**"
      - "src/**/*.py"
  workflow_dispatch:                   # allow manual trigger from Actions UI
    inputs:
      model_name:
        description: "TransformerLens model name (overrides env var)"
        required: false
        default: ""
      min_sufficiency:
        description: "Minimum sufficiency threshold (0.0–1.0)"
        required: false
        default: "0.70"

# ── Configure your audit here ────────────────────────────────────────────────
env:
  GLASSBOX_MODEL_NAME:       "gpt2"
  GLASSBOX_PROMPT:           "When Mary and John went to the store, John gave a drink to"
  GLASSBOX_CORRECT_TOKEN:    " Mary"
  GLASSBOX_INCORRECT_TOKEN:  " John"
  GLASSBOX_MIN_SUFFICIENCY:  "0.70"
  GLASSBOX_PROVIDER_NAME:    "${{ github.repository_owner }}"
  GLASSBOX_USE_CASE:         "Automated CI/CD compliance audit"
  GLASSBOX_DEPLOYMENT_CTX:   "other_high_risk"
# ── End configuration ────────────────────────────────────────────────────────

jobs:
  glassbox-audit:
    name: EU AI Act Compliance Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write      # to post commit status
      checks:   write      # to post check run summary

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install Glassbox and dependencies ───────────────────────────────
      - name: Install Glassbox AI
        run: |
          pip install --upgrade pip
          pip install "glassbox-mech-interp>=3.3.0" transformer-lens torch --index-url https://download.pytorch.org/whl/cpu
          # Uncomment for PDF report generation:
          # pip install reportlab

      # ── 4. Run the compliance audit ────────────────────────────────────────
      - name: Run Glassbox Compliance Audit
        id: audit
        env:
          # Allow workflow_dispatch input to override env var
          OVERRIDE_MODEL:     ${{ github.event.inputs.model_name }}
          OVERRIDE_THRESHOLD: ${{ github.event.inputs.min_sufficiency }}
        run: |
          python - <<'PYEOF'
          import os, sys, json, time

          model_name   = os.environ.get("OVERRIDE_MODEL") or os.environ["GLASSBOX_MODEL_NAME"]
          prompt       = os.environ["GLASSBOX_PROMPT"]
          correct      = os.environ["GLASSBOX_CORRECT_TOKEN"]
          incorrect    = os.environ["GLASSBOX_INCORRECT_TOKEN"]
          min_suff_str = os.environ.get("OVERRIDE_THRESHOLD") or os.environ["GLASSBOX_MIN_SUFFICIENCY"]
          min_suff     = float(min_suff_str)
          provider     = os.environ["GLASSBOX_PROVIDER_NAME"]
          use_case     = os.environ["GLASSBOX_USE_CASE"]
          deploy_ctx   = os.environ["GLASSBOX_DEPLOYMENT_CTX"]
          sha          = os.environ.get("GITHUB_SHA", "unknown")[:8]
          repo         = os.environ.get("GITHUB_REPOSITORY", "unknown")
          run_url      = (
              f"https://github.com/{repo}/actions/runs/"
              + os.environ.get("GITHUB_RUN_ID", "")
          )

          print(f"[Glassbox] Loading model: {model_name}")
          try:
              from transformer_lens import HookedTransformer
              from glassbox import GlassboxV2
              from glassbox.compliance import AnnexIVReport, DeploymentContext
              from glassbox.explain import NaturalLanguageExplainer

              model  = HookedTransformer.from_pretrained(model_name)
              model.eval()
              gb     = GlassboxV2(model)

              print(f"[Glassbox] Running analysis...")
              t0     = time.time()
              result = gb.analyze(
                  prompt    = prompt,
                  correct   = correct,
                  incorrect = incorrect,
              )
              elapsed = round(time.time() - t0, 2)
          except Exception as e:
              print(f"[Glassbox] FATAL: {e}", file=sys.stderr)
              sys.exit(1)

          faith   = result.get("faithfulness", {})
          suff    = faith.get("sufficiency", 0.0)
          comp    = faith.get("comprehensiveness", 0.0)
          f1      = faith.get("f1", 0.0)
          n_heads = result.get("n_heads", 0)

          if suff >= 0.90:   grade = "Excellent"
          elif suff >= 0.75: grade = "Good"
          elif suff >= 0.50: grade = "Marginal"
          else:               grade = "Poor"

          passed = suff >= min_suff

          # ── Plain-English summary ──────────────────────────────────────────
          ex      = NaturalLanguageExplainer(verbosity="standard")
          summary = ex.explain(result, model_name=model_name, prompt=prompt)

          # ── Write Annex IV JSON report ─────────────────────────────────────
          os.makedirs("glassbox-reports", exist_ok=True)
          report_data = {
              "glassbox_version": "3.3.0",
              "commit_sha":       sha,
              "timestamp_utc":    time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "model_name":       model_name,
              "provider":         provider,
              "use_case":         use_case,
              "prompt":           prompt,
              "correct_token":    correct,
              "incorrect_token":  incorrect,
              "faithfulness":     faith,
              "n_heads":          n_heads,
              "grade":            grade,
              "compliance_status": "COMPLIANT" if passed else "NEEDS_REVIEW",
              "min_sufficiency_threshold": min_suff,
              "elapsed_seconds":  elapsed,
              "regulation":       "Regulation (EU) 2024/1689 — AI Act Annex IV",
              "plain_english_summary": summary,
              "ci_run_url":       run_url,
          }

          report_path = f"glassbox-reports/annex-iv-{sha}.json"
          with open(report_path, "w") as f:
              json.dump(report_data, f, indent=2)

          # ── Write HTML report ──────────────────────────────────────────────
          html = ex.to_html(result, model_name=model_name, prompt=prompt)
          html_path = f"glassbox-reports/annex-iv-{sha}.html"
          with open(html_path, "w") as f:
              f.write(html)

          # ── Write GitHub Actions output variables ──────────────────────────
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"sufficiency={suff:.4f}\n")
              out.write(f"grade={grade}\n")
              out.write(f"n_heads={n_heads}\n")
              out.write(f"passed={'true' if passed else 'false'}\n")
              out.write(f"report_json={report_path}\n")
              out.write(f"report_html={html_path}\n")
              out.write(f"elapsed={elapsed}\n")

          # ── Print job summary ──────────────────────────────────────────────
          summary_md = f"""## Glassbox Compliance Audit — {grade}

| Metric | Value |
|---|---|
| Model | `{model_name}` |
| Commit | `{sha}` |
| Sufficiency | `{suff:.1%}` |
| Comprehensiveness | `{comp:.1%}` |
| F1 | `{f1:.1%}` |
| Circuit Heads | {n_heads} |
| Grade | **{grade}** |
| Threshold | {min_suff:.0%} |
| Status | {'✅ PASSED' if passed else '❌ FAILED'} |
| Elapsed | {elapsed}s |

### Plain English Summary

{summary}

---
*Generated by [Glassbox AI](https://github.com/ajaymahale/glassbox-mech-interp) v3.3.0 · Regulation (EU) 2024/1689 — AI Act Annex IV*
"""
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(summary_md)

          print(f"[Glassbox] Grade: {grade} | Sufficiency: {suff:.1%} | {'PASSED' if passed else 'FAILED'}")

          if not passed:
              print(
                  f"\n[Glassbox] ❌ CI FAILED: Sufficiency {suff:.1%} < threshold {min_suff:.0%}.\n"
                  f"           Increase model quality or lower GLASSBOX_MIN_SUFFICIENCY.",
                  file=sys.stderr
              )
              sys.exit(1)
          PYEOF

      # ── 5. Upload compliance reports as artifacts ───────────────────────────
      - name: Upload Annex IV Compliance Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: glassbox-annex-iv-${{ github.sha }}
          path: glassbox-reports/
          retention-days: 90

      # ── 6. Post job summary badge ──────────────────────────────────────────
      - name: Compliance Summary
        if: always()
        run: |
          echo "Sufficiency:  ${{ steps.audit.outputs.sufficiency }}"
          echo "Grade:        ${{ steps.audit.outputs.grade }}"
          echo "Circuit heads: ${{ steps.audit.outputs.n_heads }}"
          echo "Result:       ${{ steps.audit.outputs.passed == 'true' && 'PASSED ✅' || 'FAILED ❌' }}"

      # ── 7. Slack notification (optional) ──────────────────────────────────
      - name: Slack Notification
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GRADE:      ${{ steps.audit.outputs.grade }}
          SUFF:       ${{ steps.audit.outputs.sufficiency }}
          PASSED:     ${{ steps.audit.outputs.passed }}
          RUN_URL:    ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PYEOF'
          import os, json, urllib.request

          grade  = os.environ["GRADE"]
          suff   = float(os.environ["SUFF"])
          passed = os.environ["PASSED"] == "true"
          url    = os.environ["RUN_URL"]
          repo   = os.environ.get("GITHUB_REPOSITORY", "")
          sha    = os.environ.get("GITHUB_SHA", "")[:8]
          emoji  = "✅" if grade in ("Excellent", "Good") else ("⚠️" if grade == "Marginal" else "❌")

          payload = {
              "username": "Glassbox AI",
              "icon_emoji": ":shield:",
              "blocks": [
                  {"type": "header", "text": {"type": "plain_text", "text": f"{emoji} Glassbox CI Audit — {grade}"}},
                  {"type": "section", "fields": [
                      {"type": "mrkdwn", "text": f"*Repo:* `{repo}`"},
                      {"type": "mrkdwn", "text": f"*Commit:* `{sha}`"},
                      {"type": "mrkdwn", "text": f"*Sufficiency:* {suff:.1%}"},
                      {"type": "mrkdwn", "text": f"*Result:* {'PASSED ✅' if passed else 'FAILED ❌'}"},
                  ]},
                  {"type": "actions", "elements": [{"type": "button", "text": {"type": "plain_text", "text": "View CI Run"}, "url": url}]},
              ]
          }
          body = json.dumps(payload).encode()
          req  = urllib.request.Request(os.environ["SLACK_WEBHOOK_URL"], data=body, headers={"Content-Type": "application/json"})
          urllib.request.urlopen(req, timeout=10)
          PYEOF

      # ── 8. Teams notification (optional) ──────────────────────────────────
      - name: Teams Notification
        if: always() && env.TEAMS_WEBHOOK_URL != ''
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          GRADE:   ${{ steps.audit.outputs.grade }}
          SUFF:    ${{ steps.audit.outputs.sufficiency }}
          PASSED:  ${{ steps.audit.outputs.passed }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PYEOF'
          import os, json, urllib.request
          grade   = os.environ["GRADE"]
          suff    = float(os.environ["SUFF"])
          passed  = os.environ["PASSED"] == "true"
          color   = {"Excellent": "22C55E", "Good": "84CC16", "Marginal": "F59E0B"}.get(grade, "EF4444")
          payload = {
              "@type": "MessageCard", "@context": "http://schema.org/extensions",
              "themeColor": color, "summary": f"Glassbox audit: {grade}",
              "title": f"Glassbox CI — {grade} ({'PASSED' if passed else 'FAILED'})",
              "sections": [{"facts": [
                  {"name": "Repository", "value": os.environ.get("GITHUB_REPOSITORY", "")},
                  {"name": "Commit", "value": os.environ.get("GITHUB_SHA", "")[:8]},
                  {"name": "Sufficiency", "value": f"{suff:.1%}"},
                  {"name": "Grade", "value": grade},
              ]}],
              "potentialAction": [{"@type": "OpenUri", "name": "View Run", "targets": [{"os": "default", "uri": os.environ["RUN_URL"]}]}]
          }
          body = json.dumps(payload).encode()
          req  = urllib.request.Request(os.environ["TEAMS_WEBHOOK_URL"], data=body, headers={"Content-Type": "application/json"})
          urllib.request.urlopen(req, timeout=10)
          PYEOF
